<html>
<head>
    
    <title>Reaction</title>
    <style>
        body:active #game-container {
            transform: scale(0.98);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.05s ease;
        }
        body{
            display: flex;
            margin: 0;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #3498db;
            transition: background-color 0.1s ease;
 
        }
        #game-container {
            text-align: center;
             background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            pointer-events: none;
            width: 300px;  
    min-height: 150px;
    flex-shrink: 0;  
        }
h1 { margin: 0;}
.stats { margin-top: 20px; border-top: 1px solid #ddd; padding-top: 10px
       
    </style>
</head>
<body>
    <button id="theme-toggle" style="position:fixed; top:10px; right:10px; z-index:100;">🌓 Toggle the color theme</button>

<div id="game-container">
    <h1 id="target">Click to Start</h1>
    <p id="result">Wait for the screen to turn green!</p>
    <div class="stats">
        <p>Your High Score: <span id="high-score">--</span>ms</p>
        <p>Your Average: <span id="average-score">--</span>ms</p>
    </div>
</div>

<script>
    const targetText = document.getElementById('target');
    const resultDisplay = document.getElementById('result');
    const highScoreDisplay = document.getElementById('high-score');
    const averageDisplay = document.getElementById('average-score');

    let startTime;
    let timeout;
    let gameStarted = false;
    let waitingForGreen = false;
    let allScores = [];
   let highScore = Infinity;

    if (highScore !== Infinity) highScoreDisplay.innerText = highScore;

    document.body.addEventListener('mousedown', () => {
        if (!gameStarted && !waitingForGreen) {
            
            gameStarted = true;
            waitingForGreen = true;
            document.body.style.backgroundColor = "#2c3e50"; 
            targetText.innerText = "Wait...";
            resultDisplay.innerText = "Focus...";

            const randomDelay = Math.random() * 3100 + 2000; 

            timeout = setTimeout(() => {
            
                document.body.style.backgroundColor = "#2ecc71"; 
                targetText.innerText = "Click now!";
                startTime = performance.now();
                waitingForGreen = false;
            }, randomDelay);

        } else if (gameStarted && !waitingForGreen) {
            
            const reactionTime = Math.round(performance.now() - startTime);
            gameStarted = false;
            document.body.style.backgroundColor = "#3498db"; 
            
            targetText.innerText = reactionTime + "ms";
            resultDisplay.innerText = "Click to try again!";
            if (reactionTime < highScore) {
                highScore = reactionTime;
                localStorage.setItem('bestReactionTime', highScore);
                highScoreDisplay.innerText = highScore;
            }
            allScores.push(reactionTime);
            const avg = Math.round(allScores.reduce((a, b) => a + b) / allScores.length);
            averageDisplay.innerText = avg;

        } else if (waitingForGreen) {
            clearTimeout(timeout);
            waitingForGreen = false;
            gameStarted = false;
            document.body.style.backgroundColor = "#e74c3c"; 
            targetText.innerText = "Too early!";
            resultDisplay.innerText = "Click to restart.";
        }
    });
   
document.getElementById('theme-toggle').addEventListener('mousedown', (e) => {
    e.stopPropagation();
     document.body.style.filter = document.body.style.filter ? '' : 'invert(1) hue-rotate(180deg)';
});
</script>

</body>
</html>
